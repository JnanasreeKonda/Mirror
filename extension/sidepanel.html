<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirror | AI Stylist</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --onyx:      #080808;
            --obsidian:  #111111;
            --card:      #161616;
            --gold:      #c9a84c;
            --gold-light:#e8c97a;
            --cream:     #f5f0e8;
            --border:    rgba(201,168,76,0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--onyx);
            color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── METALLIC GOLD SHINE ── */
        .gold-text-shine {
            background: linear-gradient(to right, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fcf6ba 75%, #bf953f 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 4s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .header { padding: 16px 20px 0; flex-shrink: 0; }
        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300; font-size: 2.2rem;
            letter-spacing: 12px; text-transform: uppercase;
        }
        .brand em { color: var(--gold); font-style: normal; }

        .canvas-wrap { margin: 10px 20px 8px; flex-shrink: 0; height: 160px; position: relative; }
        .canvas-inner {
            width: 100%; height: 100%;
            background: var(--obsidian);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
        }
        #preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .empty-label { font-size: 0.48rem; letter-spacing: 5px; text-transform: uppercase; opacity: 0.35; }

        #outputPanel {
            margin: 0 20px 6px; border: 1px solid var(--border);
            background: var(--card); display: none;
            flex-direction: column; flex: 1; overflow: hidden;
        }

        /* ── INSCRIPTION ZONE ── */
        .inscription-zone { padding: 0 20px 14px; flex-shrink: 0; }
        .chapter { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
        .chapter-rule { flex: 1; height: 1px; background: var(--border); }
        .chapter-label { font-size: 0.55rem; letter-spacing: 5px; text-transform: uppercase; }

        #user-input {
            width: 100%; background: transparent; border: none; outline: none;
            border-bottom: 1px solid var(--border);
            font-family: 'Cormorant Garamond', serif; font-style: italic;
            font-size: 1.2rem; color: var(--cream); padding: 8px 0; margin-bottom: 12px;
        }

        .controls-row { display: flex; align-items: center; gap: 12px; }
        .mic-orb {
            width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--gold);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            background: radial-gradient(circle, rgba(201,168,76,0.2), transparent);
        }
        #sendBtn {
            background: transparent; border: 1px solid var(--gold);
            color: var(--gold); font-size: 0.48rem; letter-spacing: 3px;
            text-transform: uppercase; padding: 9px 14px; cursor: pointer;
        }

        @keyframes imgReveal { from{opacity:0;filter:blur(4px)} to{opacity:1;filter:blur(0)} }
    </style>
</head>
<body>

<div class="header">
    <h1 class="brand">M<em>i</em>rror</h1>
</div>

<div class="canvas-wrap">
    <div class="canvas-inner">
        <img id="preview" src="">
        <div class="empty-label" id="emptyState">Capture your context</div>
    </div>
</div>

<div id="outputPanel"></div>

<div class="inscription-zone">
    <div class="chapter">
        <div class="chapter-rule"></div>
        <div class="chapter-label gold-text-shine" id="chapterLabel">inscribe your desire</div>
        <div class="chapter-rule"></div>
    </div>

    <textarea id="user-input" rows="2" placeholder="Seek the extraordinary… or speak below"></textarea>

    <div id="recording-bar" style="display:none; align-items:center; background:var(--obsidian); border:1px solid var(--gold); border-radius:30px; padding:5px 15px; margin-bottom:12px; gap:10px;">
        <span style="color:var(--gold); font-size:1.2rem;">+</span>
        <canvas id="waveformCanvas" width="180" height="20" style="flex:1; height:20px; width:100%;"></canvas>
        <button id="tickBtn" style="background:var(--gold); border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; color:var(--onyx); font-weight:bold;">✓</button>
    </div>

    <div class="controls-row">
        <div class="mic-orb" id="micBtn" title="Click to record voice">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e8c97a" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            </svg>
        </div>
        <div class="mic-copy">
            <div class="mic-sub gold-text-shine" id="micSub">Voice becomes intention</div>
        </div>
        <button id="sendBtn">Find My Look ↩</button>
    </div>
</div>

<div id="status" style="font-size: 10px; text-align: center; color: var(--gold); opacity: 0.5; padding-bottom: 10px;">READY</div>

<script src="sidepanel.js"></script>
</body>
</html>
