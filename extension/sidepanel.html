<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirror | AI Stylist</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --onyx: #080808;
            --obsidian: #111111;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --cream: #f5f0e8;
            --border: rgba(201,168,76,0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--onyx);
            color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* ── METALLIC GOLD TEXT SHINE ── */
        .gold-text-shine {
            background: linear-gradient(to right, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fcf6ba 75%, #bf953f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 4s linear infinite;
            font-weight: 600;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.3);
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* ── HEADER ── */
        .header { padding: 20px 22px 0; z-index: 10; animation: riseIn 0.9s ease both; }
        .brand {
            font-family: 'Cormorant Garamond', serif; font-weight: 300;
            font-size: 2.4rem; letter-spacing: 12px; text-transform: uppercase;
        }
        .brand em { color: var(--gold); font-style: normal; }
        .tagline { font-size: 0.45rem; letter-spacing: 3.5px; text-transform: uppercase; color: var(--gold); margin-top: 7px; }

        /* ── CANVAS ── */
        .canvas-wrap { flex: 1; margin: 12px 22px 10px; position: relative; overflow: hidden; }
        .canvas-inner {
            width: 100%; height: 100%; background: var(--obsidian);
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
        }
        #preview { width:100%; height:100%; object-fit:cover; display:none; animation: imgReveal 1s ease both; }
        .empty-label { font-size:0.5rem; letter-spacing:5px; text-transform:uppercase; opacity: 0.4; }

        /* ── INSCRIPTION ZONE ── */
        .inscription-zone { padding: 0 22px 20px; z-index: 10; position: relative; }
        .chapter { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; }
        .chapter-rule { flex:1; height:1px; background: var(--border); }
        .chapter-label { font-size: 0.6rem; letter-spacing: 5px; text-transform: uppercase; }

        #user-input {
            width: 100%; background: transparent; border: none; outline: none;
            border-bottom: 1px solid var(--border);
            font-family: 'Cormorant Garamond', serif; font-style: italic;
            font-size: 1.3rem; color: var(--cream); padding: 10px 0; margin-bottom: 15px;
        }
        #user-input::placeholder { color: rgba(201, 168, 76, 0.6); }

        /* ── MIC ASSEMBLY ── */
        .mic-assembly { display: flex; align-items: center; gap: 15px; }
        .mic-orb {
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--gold);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            background: radial-gradient(circle, rgba(201,168,76,0.2), transparent);
        }
        .mic-label { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; }
        .mic-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.9rem; }

        @keyframes riseIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes imgReveal { from{opacity:0;filter:blur(5px)} to{opacity:1;filter:blur(0)} }
    </style>
</head>
<body>

<div class="header">
    <h1 class="brand">M<em>i</em>rror</h1>
    <div class="tagline gold-text-shine">Dress Like Nobody's Watching. Shop Like Everybody Is.</div>
</div>

<div class="canvas-wrap">
    <div class="canvas-inner">
        <img id="preview" src="">
        <div class="empty-label" id="emptyState">Capture your context</div>
    </div>
</div>

<div class="inscription-zone">
    <div class="chapter">
        <div class="chapter-rule"></div>
        <div class="chapter-label gold-text-shine" id="chapterLabel">inscribe your desire</div>
        <div class="chapter-rule"></div>
    </div>

    <textarea id="user-input" rows="1" placeholder="Seek the extraordinary…"></textarea>

    <div class="mic-assembly">
        <div class="mic-orb" id="micBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e8c97a" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
        </div>
        <div class="mic-copy">
<!--            <div class="mic-label gold-text-shine" id="micLabel">Touch the orb to speak</div>-->
            <div class="mic-sub gold-text-shine" id="micSub">Voice becomes intention</div>
        </div>
    </div>
</div>

<div id="status" style="font-size: 10px; text-align: center; color: var(--gold); margin-top: 10px; opacity: 0.5;">READY</div>

<script src="sidepanel.js"></script>
</body>
</html>
